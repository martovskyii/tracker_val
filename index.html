<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23C10801'/%3E%3Cstop offset='55%25' stop-color='%23F16001'/%3E%3Cstop offset='100%25' stop-color='%23E85002'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='%23000'/%3E%3Ccircle cx='32' cy='32' r='24' fill='url(%23g)'/%3E%3Cpath d='M20 36h18c4.5 0 7-2.3 7-6 0-3.3-2.2-5.6-6.6-5.6h-8.2c-2.8 0-4.2-1.1-4.2-2.9 0-1.8 1.4-3 4-3h16' fill='none' stroke='%23F9F9F9' stroke-width='4.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23C10801'/%3E%3Cstop offset='55%25' stop-color='%23F16001'/%3E%3Cstop offset='100%25' stop-color='%23E85002'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='%23000'/%3E%3Ccircle cx='32' cy='32' r='24' fill='url(%23g)'/%3E%3Cpath d='M20 36h18c4.5 0 7-2.3 7-6 0-3.3-2.2-5.6-6.6-5.6h-8.2c-2.8 0-4.2-1.1-4.2-2.9 0-1.8 1.4-3 4-3h16' fill='none' stroke='%23F9F9F9' stroke-width='4.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <title>Финансовый трекер</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="liquid-bg" aria-hidden="true"></div>

  <div class="app-shell">
    <header class="glass top-header">
      <div>
        <h1>Финансы</h1>
        <p id="header-subtitle" class="subtitle">Этот месяц: —</p>
      </div>
    </header>

    <main id="view-root" class="view-root" aria-live="polite"></main>
  </div>

  <nav class="bottom-nav-wrap" aria-label="Primary">
    <div class="glass bottom-nav">
      <button class="tab-btn" data-tab="add" type="button" aria-label="Добавить">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
        <span>Добавить</span>
      </button>

      <button class="tab-btn" data-tab="transactions" type="button" aria-label="Операции">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h10"></path></svg>
        <span>Операции</span>
      </button>

      <button class="tab-btn" data-tab="analytics" type="button" aria-label="Аналитика">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V9M12 19V5M19 19v-7"></path></svg>
        <span>Аналитика</span>
      </button>

      <button class="tab-btn" data-tab="budgets" type="button" aria-label="Бюджеты">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v10H4zM8 11h8"></path></svg>
        <span>Бюджеты</span>
      </button>

      <button class="tab-btn" data-tab="settings" type="button" aria-label="Настройки">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 8.5A3.5 3.5 0 1 0 12 15.5A3.5 3.5 0 1 0 12 8.5Z"></path>
          <path d="M19 12h2M3 12h2M12 3v2M12 19v2M17.4 6.6l1.4-1.4M5.2 18.8l1.4-1.4M17.4 17.4l1.4 1.4M5.2 5.2l1.4 1.4"></path>
        </svg>
        <span>Настройки</span>
      </button>
    </div>
  </nav>

  <div id="modal-root" class="modal-root hidden" aria-hidden="true"></div>
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
